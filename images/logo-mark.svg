<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="none">

  <!-- Ink-wash background — egg/head shaped, reinforces the face reading -->
  <ellipse cx="25" cy="27" rx="11" ry="15" fill="#4a6251" opacity="0.13" transform="rotate(-6 25 27)"/>

  <!-- Hand-drawn circle — slightly imperfect -->
  <path d="
    M 28,6.8
    C 40.5,6.5 50,15.8 49.7,28
    C 49.4,40.5 39.5,50.2 27.5,49.7
    C 15.5,49.2 6.3,39.2 6.7,27
    C 7.1,15.2 16.8,7 28,7
  " stroke="#4a6251" stroke-width="1.1" stroke-linecap="round"/>

  <!-- F stem — gently curved to suggest a face profile (forehead → nose → chin) -->
  <path d="M 21.5,14 C 22.5,17 23,20 22,25 C 21.2,29 21.8,34 21.5,42"
        stroke="#1a1916" stroke-width="2.7" stroke-linecap="round"/>

  <!-- Eye — the single abstract element that makes the F read as a face -->
  <circle cx="27" cy="19.5" r="2" fill="#4a6251"/>

  <!-- Top branch — the brow line of the F / face -->
  <path d="M 21.5,23 C 25.5,22.3 30,22.6 35,23.6"
        stroke="#1a1916" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Middle branch — shorter, mouth / lower F bar -->
  <path d="M 21.5,32 C 25,31.3 28.5,31.5 31.5,32.3"
        stroke="#1a1916" stroke-width="2.2" stroke-linecap="round"/>

</svg>
