<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 82" fill="none">

  <!-- Hexagonal frame -->
  <polygon points="30,7 49,18 49,40 30,51 11,40 11,18"
           stroke="#1a1916" stroke-width="1.3" stroke-linejoin="miter" fill="none"/>

  <!-- Body / shoulders — filled, draped -->
  <path d="M 18,37 C 16,36 13,37 12,40 L 12,50 L 46,50 L 46,40
           C 45,37 42,36 40,37 C 37,35 33,34 29,34 C 25,34 21,35 18,37 Z"
        fill="#1a1916"/>

  <!-- Left wing — sweeps upward from shoulder -->
  <path d="M 18,37 C 15,33 13,26 13,20 C 13,14 15,12 17,14
           C 19,16 20,23 20,30 L 20,35 Z"
        fill="#1a1916"/>

  <!-- Right wing — mirror -->
  <path d="M 40,37 C 43,33 45,26 45,20 C 45,14 43,12 41,14
           C 39,16 38,23 38,30 L 38,35 Z"
        fill="#1a1916"/>

  <!-- Helmet dome -->
  <path d="M 20,34 L 20,23 C 20,14 24,9 29,9 C 34,9 38,14 38,23 L 38,34 Z"
        fill="#1a1916"/>

  <!-- Helmet crest — sharp angular ridge -->
  <path d="M 26,16 L 29,8 L 32,16 Z" fill="#1a1916"/>

  <!-- Face — white oval cut-out within helmet -->
  <ellipse cx="29" cy="24.5" rx="7" ry="9" fill="white"/>

  <!-- Brows — strong, slanted inward -->
  <line x1="22.5" y1="20.5" x2="27.5" y2="19"
        stroke="#1a1916" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="30.5" y1="19" x2="35.5" y2="20.5"
        stroke="#1a1916" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Eyes — angular, cold -->
  <polyline points="22.5,24.5 25.5,22 28.5,24.5"
            stroke="#1a1916" stroke-width="1.0" stroke-linejoin="miter" stroke-linecap="round" fill="none"/>
  <polyline points="29.5,24.5 32.5,22 35.5,24.5"
            stroke="#1a1916" stroke-width="1.0" stroke-linejoin="miter" stroke-linecap="round" fill="none"/>

  <!-- Nose — minimal suggestion -->
  <path d="M 27.5,26 C 27,28.5 27.5,30 28.5,31 L 29.5,31 C 30.5,30 31,28.5 30.5,26"
        stroke="#1a1916" stroke-width="0.6" stroke-linecap="round" fill="none"/>

  <!-- Lips — thin, dark, composed -->
  <path d="M 25.5,33 C 27,31.5 31,31.5 32.5,33 C 31,34.5 27,34.5 25.5,33 Z"
        fill="#1a1916"/>

  <!-- Wing feather lines — white strokes over dark wings -->
  <path d="M 16,15 C 14,20 13,26 14,33" stroke="white" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M 18,18 C 16,23 16,29 17,35" stroke="white" stroke-width="0.5" stroke-linecap="round" fill="none"/>
  <path d="M 42,15 C 44,20 45,26 44,33" stroke="white" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M 40,18 C 42,23 42,29 41,35" stroke="white" stroke-width="0.5" stroke-linecap="round" fill="none"/>

  <!-- Robe drapery — white lines over body -->
  <line x1="22" y1="38" x2="21" y2="50" stroke="white" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="27" y1="37" x2="26" y2="50" stroke="white" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="31" y1="37" x2="32" y2="50" stroke="white" stroke-width="0.6" stroke-linecap="round"/>
  <line x1="36" y1="38" x2="37" y2="50" stroke="white" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Separator -->
  <line x1="12" y1="61" x2="48" y2="61" stroke="#1a1916" stroke-width="0.4"/>

  <!-- Wordmark -->
  <text x="30" y="73"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="8"
        font-weight="400"
        letter-spacing="4"
        text-anchor="middle"
        fill="#1a1916">FREYA</text>

</svg>
